name: CI Pipeline

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compile
      run: ./mvnw compile

    - name: Run tests
      run: ./mvnw test

    - name: Build
      run: ./mvnw package -DskipTests
